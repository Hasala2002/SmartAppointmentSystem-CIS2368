# Coolify deployment for the Smart Appointment System.
#
# Set in Coolify "Environment Variables":
#   SERVICE_FQDN_API=https://smartappointmentapi.digitalocean.hasala.me
#   SERVICE_FQDN_WEB=https://smartappointmentweb.digitalocean.hasala.me
#   SERVICE_FQDN_ADMIN=https://smartappointmentadmin.digitalocean.hasala.me
#   DB_PASSWORD=<strong-password>
#   JWT_SECRET_KEY=<long-random-secret>
#
services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-appointmentdb}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-appointmentdb}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SERVICE_FQDN_API_8000: ""
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD}@db:5432/${DB_NAME:-appointmentdb}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      APP_ENV: ${APP_ENV:-production}
      DEBUG: ${DEBUG:-false}
      CORS_ORIGINS: '${CORS_ORIGINS:-["https://smartappointmentweb.digitalocean.hasala.me","https://smartappointmentadmin.digitalocean.hasala.me"]}'
      # VAPID – leave blank to disable push notifications without crashing
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_EMAIL: ${VAPID_EMAIL:-mailto:admin@lonestardental.com}
      # Resend – email via HTTPS (works on DigitalOcean where SMTP is blocked)
      # Get a free API key at https://resend.com
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-onboarding@resend.dev}
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://smartappointmentapi.digitalocean.hasala.me/api/v1
        VITE_WS_URL: wss://smartappointmentapi.digitalocean.hasala.me
    restart: unless-stopped
    environment:
      SERVICE_FQDN_WEB_80: ""
    expose:
      - "80"
    depends_on:
      - api

  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://smartappointmentapi.digitalocean.hasala.me/api/v1
        VITE_WS_URL: wss://smartappointmentapi.digitalocean.hasala.me
    restart: unless-stopped
    environment:
      SERVICE_FQDN_ADMIN_80: ""
    expose:
      - "80"
    depends_on:
      - api

volumes:
  postgres_data:
